name: Gmail API Workflow

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'   # runs every hour (optional)
  workflow_dispatch:       # allows manual trigger

jobs:
  run-gmail-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run app
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REDIRECT_URI: ${{ secrets.GMAIL_REDIRECT_URI }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: node index.js
```

---

## Step 5 — Add Secrets to GitHub

Go to your repo → **Settings → Secrets and Variables → Actions → New repository secret** and add:

| Secret Name | Where to get it |
|---|---|
| `GMAIL_CLIENT_ID` | Google Cloud Console → Credentials |
| `GMAIL_CLIENT_SECRET` | Google Cloud Console → Credentials |
| `GMAIL_REDIRECT_URI` | Use `https://developers.google.com/oauthplayground` |
| `GMAIL_REFRESH_TOKEN` | From OAuth Playground (see below) |

---

## Step 6 — Get Your Refresh Token (One Time)

1. Go to **[OAuth Playground](https://developers.google.com/oauthplayground)**
2. Click ⚙️ (settings) → check **"Use your own OAuth credentials"** → enter your Client ID & Secret
3. Select scope: `https://mail.google.com/`
4. Click **Authorize APIs** → sign in
5. Click **Exchange authorization code for tokens**
6. Copy the **Refresh Token** → paste into GitHub Secrets

